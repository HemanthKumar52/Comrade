name: partner_mobile
description: "Partner - Travel Together. Explore Beyond."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  # State Management
  flutter_riverpod: ^2.5.0
  riverpod_annotation: ^2.3.0
  # Networking
  dio: ^5.4.0
  retrofit: ^4.1.0
  # Navigation
  go_router: ^14.0.0
  # Maps
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  # Local Storage
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.0
  # Real-time
  socket_io_client: ^2.0.0
  # UI
  flutter_animate: ^4.5.0
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0
  fl_chart: ^0.68.0
  # Location
  geolocator: ^12.0.0
  geocoding: ^3.0.0
  # Media
  image_picker: ^1.0.0
  record: ^5.1.0
  path_provider: ^2.1.0
  # Notifications
  flutter_local_notifications: ^17.0.0
  # Utils
  intl: ^0.19.0
  url_launcher: ^6.2.0
  share_plus: ^9.0.0
  permission_handler: ^11.3.0
  connectivity_plus: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.0
  riverpod_generator: ^2.4.0
  retrofit_generator: ^8.1.0
  json_serializable: ^6.8.0
  json_annotation: ^4.9.0

flutter:
  uses-material-design: true
